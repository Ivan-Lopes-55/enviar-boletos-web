<!DOCTYPE html><html><body>
<h2>Envio de Boletos</h2>
<form id="form">
<input type="file" id="planilha"><br><br>
<input type="file" id="pdfs" multiple><br><br>
<input type="email" id="smtp_user" placeholder="Email SMTP"><br><br>
<input type="password" id="smtp_pass" placeholder="Senha SMTP"><br><br>
<button>Enviar</button>
</form>
<pre id="log"></pre>
<script>
document.getElementById('form').onsubmit = async e => {
 e.preventDefault();
 let fd = new FormData();
 fd.append('planilha', document.getElementById('planilha').files[0]);
 for (let f of document.getElementById('pdfs').files) fd.append('pdfs', f);
 fd.append('smtp_user', document.getElementById('smtp_user').value);
 fd.append('smtp_pass', document.getElementById('smtp_pass').value);
 let r = await fetch('/enviar-boletos', {method:'POST', body:fd});
 document.getElementById('log').textContent = await r.text();
};
</script>
</body></html>
