
<!DOCTYPE html>
<html lang='pt-BR'>
<head>
  <meta charset='UTF-8'>
  <title>Envio de Boletos</title>
  <style>
      #dropzone {
          width: 100%; padding: 40px; border: 3px dashed #888; text-align: center; margin: 20px 0;
      }
  </style>
</head>
<body>
<h2>Enviar boletos</h2>
<form id='form'>
    <label>Planilha XLSX:</label><br>
    <input type='file' id='planilha'><br><br>

    <div id='dropzone'>Arraste os PDFs aqui</div>

    <label>Email SMTP:</label>
    <input type='email' id='smtp_user'><br><br>

    <label>Senha SMTP:</label>
    <input type='password' id='smtp_pass'><br><br>

    <button type='submit'>Enviar</button>
</form>

<pre id='log'></pre>

<script>
let pdfs = [];

document.getElementById('dropzone').addEventListener('drop', e => {
    e.preventDefault();
    for (let file of e.dataTransfer.files) pdfs.push(file);
    document.getElementById('dropzone').innerText = pdfs.length + ' PDF(s) adicionados';
});

document.getElementById('dropzone').addEventListener('dragover', e => e.preventDefault());

document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const form = new FormData();
    form.append('planilha', document.getElementById('planilha').files[0]);
    pdfs.forEach(p => form.append('pdfs', p));
    form.append('smtp_user', document.getElementById('smtp_user').value);
    form.append('smtp_pass', document.getElementById('smtp_pass').value);

    const resp = await fetch('/enviar-boletos', { method: 'POST', body: form });
    const out = await resp.json();
    document.getElementById('log').innerText = JSON.stringify(out, null, 2);
});
</script>
</body>
</html>
